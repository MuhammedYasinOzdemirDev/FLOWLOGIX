name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repository kaynaklarını al
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: .NET SDK'yı hazırla
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: NuGet paketlerini geri yükle
        run: dotnet restore ./FlowLogix.sln

      - name: Solution'ı derle
        run: dotnet build ./FlowLogix.sln --configuration Release --no-restore

      - name: Backend testlerini çalıştır
        run: dotnet test ./FlowLogix.sln --configuration Release --no-build --no-restore

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repository kaynaklarını al
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Node.js ortamını hazırla
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Frontend paketlerini temiz kur
        run: npm ci --prefix ./src/FlowLogix.Web

      - name: Kod biçimini denetle
        run: npm run format:check --prefix ./src/FlowLogix.Web

      - name: Kod kurallarını denetle
        run: npm run lint --prefix ./src/FlowLogix.Web

      - name: Frontend testlerini çalıştır
        run: npm run test --prefix ./src/FlowLogix.Web

      - name: Production paketini oluştur
        run: npm run build --prefix ./src/FlowLogix.Web
